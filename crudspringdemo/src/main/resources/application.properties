############################################################
# Spring Boot Application Configuration
############################################################

# Application Name
spring.application.name=crudspringdemo

############################################################
# Database Configuration (MySQL)
############################################################

# Database Connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/student_db

# Database Username
spring.datasource.username=root

# Database Password
spring.datasource.password=#########
############################################################
# JPA / Hibernate Configuration
############################################################

# Automatically update the database schema based on entity changes.
# Options:
# create       - Creates a new schema every time the application starts.
# create-drop  - Creates schema on startup and drops it on shutdown.
# update       - Updates the existing schema without deleting data.
# validate     - Validates schema without making changes.
# none         - Disables schema generation.
spring.jpa.hibernate.ddl-auto=update

# Display SQL queries in the console.
spring.jpa.show-sql=true

# Format SQL queries for better readability.
spring.jpa.properties.hibernate.format_sql=true